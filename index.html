  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LAB ENTRANCE｜淡藍科技版</title>
  <meta name="description" content="卡片式入口頁範例：可搜尋、可依標籤篩選，方便修改縮圖、連結與新增標籤。" />
  <meta name="theme-color" content="#eef5fc" />
  <style>
    /* =========================================
       明亮科技感色彩定義 (Light Tech Theme)
       ========================================= */
    :root {
      --bg-base: #eef5fc;         /* 淡藍色底 */
      --bg-surface: #ffffff;      /* 表面白 */
      --panel-bg: rgba(255, 255, 255, 0.65); /* 磨砂玻璃白 */
      
      --text-main: #0f172a;       /* 深灰藍文字（近黑） */
      --text-muted: #64748b;      /* 次要文字（灰藍） */
      
      --border-thin: rgba(15, 23, 42, 0.08);
      --border-hover: rgba(14, 165, 233, 0.3);
      
      --tech-cyan: #0ea5e9;       /* 科技藍 */
      --tech-cyan-dim: rgba(14, 165, 233, 0.12);
      --tech-purple: #6366f1;     /* 靛紫 */
      --tech-purple-dim: rgba(99, 102, 241, 0.1);
      
      --shadow-base: 0 8px 30px -6px rgba(15, 23, 42, 0.06);
      --shadow-hover: 0 20px 40px -10px rgba(14, 165, 233, 0.15);
      
      --radius-sm: 12px;
      --radius-md: 16px;
      --radius-lg: 24px;
      
      --max-w: 1240px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      color: var(--text-main);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
      background-color: var(--bg-base);
      background-image: 
        radial-gradient(circle at 10% 0%, var(--tech-purple-dim) 0%, transparent 40%),
        radial-gradient(circle at 90% 100%, var(--tech-cyan-dim) 0%, transparent 40%);
      background-attachment: fixed;
      position: relative;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* 科技感淡色背景網格 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: 
        linear-gradient(rgba(15, 23, 42, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15, 23, 42, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 0%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 0%, transparent 80%);
      z-index: -1;
    }

    a { color: inherit; text-decoration: none; }
    .wrap { max-width: var(--max-w); margin: 0 auto; padding: 40px 24px 80px; }

    /* =========================================
       Hero Section (頭部區塊)
       ========================================= */
    .hero {
      display: grid;
      gap: 24px;
      padding: 32px;
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: var(--shadow-base), inset 0 1px 0 rgba(255,255,255,1);
      backdrop-filter: blur(24px) saturate(150%);
      -webkit-backdrop-filter: blur(24px) saturate(150%);
      position: relative;
      overflow: hidden;
    }
    
    /* 頂部科技感光帶 */
    .hero::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--tech-cyan), var(--tech-purple), transparent);
      opacity: 0.8;
    }

    .hero-top { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
    .brand { display: flex; gap: 20px; align-items: center; }
    
    .logo {
      width: 56px; height: 56px; display: grid; place-items: center; flex: none;
      border-radius: var(--radius-md);
      background: linear-gradient(135deg, #ffffff, #f1f5f9);
      border: 1px solid rgba(15,23,42,0.05);
      color: var(--text-main);
      font-size: 24px;
      font-weight: 900;
      position: relative;
      box-shadow: 0 4px 12px rgba(15,23,42,0.06), inset 0 2px 4px rgba(255,255,255,1);
    }
    /* Logo漸層特效 */
    .logo::after {
      content: "L";
      position: absolute;
      background: linear-gradient(135deg, var(--tech-cyan), var(--tech-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .title { margin: 0; font-size: clamp(32px, 5vw, 48px); font-weight: 800; letter-spacing: -0.03em; line-height: 1.1; color: #0f172a; }
    .subtitle { margin: 8px 0 0; color: var(--tech-cyan); font-size: 15px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
    
    .top-badge {
      padding: 6px 14px; border-radius: 999px; 
      border: 1px solid var(--border-thin);
      background: rgba(255,255,255,0.7);
      color: var(--text-muted); font-size: 13px; font-weight: 600; letter-spacing: 0.1em;
      backdrop-filter: blur(10px);
      box-shadow: 0 2px 6px rgba(15,23,42,0.04);
    }

    /* =========================================
       Toolbar (搜尋與標籤列)
       ========================================= */
    .toolbar { display: grid; gap: 16px; margin-top: 8px; }
    @media (min-width: 920px) {
      .toolbar { grid-template-columns: 1.2fr 1.8fr; align-items: center; }
    }

    .search {
      display: flex; align-items: center; gap: 12px; padding: 14px 20px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid var(--border-thin);
      transition: all 0.3s ease;
      box-shadow: inset 0 2px 4px rgba(15,23,42,0.02), 0 2px 8px rgba(15,23,42,0.03);
    }
    .search:focus-within {
      border-color: var(--tech-cyan);
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
    }
    .search svg { color: #94a3b8; transition: color 0.3s ease; }
    .search:focus-within svg { color: var(--tech-cyan); }
    .search input {
      width: 100%; border: 0; outline: 0; background: transparent; color: var(--text-main); font-size: 16px; font-weight: 500;
    }
    .search input::placeholder { color: #94a3b8; font-weight: 400; }

    .chips { display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-start; }
    .chip {
      appearance: none;
      border: 1px solid var(--border-thin);
      background: rgba(255, 255, 255, 0.5);
      color: var(--text-muted);
      padding: 8px 16px; border-radius: 999px; cursor: pointer; font-size: 14px; font-weight: 600;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(8px);
    }
    .chip:hover {
      border-color: var(--tech-cyan);
      color: var(--tech-cyan);
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 4px 10px rgba(14, 165, 233, 0.1);
    }
    .chip[aria-pressed="true"] {
      background: var(--tech-cyan);
      color: #ffffff;
      border-color: var(--tech-cyan);
      box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
    }

    .result-bar { margin: 8px 4px 0; color: var(--text-muted); font-size: 14px; font-weight: 500; }
    .result-bar span { color: var(--tech-cyan); font-weight: 700; }

    /* =========================================
       卡片網格與設計 (Cards)
       ========================================= */
    .grid {
      display: grid; grid-template-columns: repeat(1, minmax(0, 1fr)); gap: 24px; margin-top: 32px;
    }
    @media (min-width: 680px) { .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (min-width: 1040px){ .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } }

    .card {
      display: grid; grid-template-rows: auto 1fr auto;
      min-height: 340px; border-radius: var(--radius-md); overflow: hidden;
      background: var(--panel-bg);
      border: 1px solid rgba(255,255,255,0.8);
      box-shadow: var(--shadow-base);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      text-decoration: none;
    }
    
    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(255, 255, 255, 1);
      box-shadow: var(--shadow-hover);
      background: rgba(255, 255, 255, 0.85);
    }
    
    /* 滑過時的淺藍光暈 */
    .card::before {
      content: "";
      position: absolute; top: 0; left: 0; right: 0; height: 100%;
      background: radial-gradient(800px circle at var(--mouse-x, 50%) -20%, rgba(14, 165, 233, 0.08), transparent 40%);
      pointer-events: none;
      opacity: 0; transition: opacity 0.3s ease;
      z-index: 1;
    }
    .card:hover::before { opacity: 1; }

    .thumb {
      aspect-ratio: 16/9; position: relative; display: grid; place-items: center;
      background: linear-gradient(135deg, #f8fafc, #e2e8f0);
      border-bottom: 1px solid rgba(15,23,42,0.05);
      padding: 24px;
      overflow: hidden;
    }
    
    /* 縮圖內部網格裝飾 */
    .thumb::before {
      content: "";
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(15,23,42,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(15,23,42,0.03) 1px, transparent 1px);
      background-size: 20px 20px;
      pointer-events: none;
    }
    
    .thumb svg {
      width: 100%; height: 100%; max-width: 280px; max-height: 150px; 
      color: #64748b;
      filter: drop-shadow(0 4px 10px rgba(15,23,42,0.08));
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), color 0.3s ease, filter 0.3s ease;
      position: relative;
      z-index: 2;
    }
    .card:hover .thumb svg {
      transform: scale(1.08);
      color: var(--tech-cyan);
      filter: drop-shadow(0 8px 16px rgba(14, 165, 233, 0.25));
    }

    .thumb-badge {
      position: absolute; left: 16px; top: 16px; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(15,23,42,0.08); color: var(--text-main);
      backdrop-filter: blur(4px);
      box-shadow: 0 2px 8px rgba(15,23,42,0.05);
      z-index: 3;
    }

    .body { padding: 24px 20px 16px; display: grid; gap: 12px; align-content: start; position: relative; z-index: 2; }
    
    .name-row { display: flex; gap: 12px; align-items: center; justify-content: space-between; }
    .name { font-size: 22px; font-weight: 800; line-height: 1.2; letter-spacing: -0.01em; margin: 0; color: var(--text-main); }
    
    .pill {
      padding: 4px 10px; border-radius: 999px; border: 1px solid var(--border-thin);
      font-size: 11px; font-weight: 700; color: var(--tech-purple); white-space: nowrap;
      background: rgba(99, 102, 241, 0.05);
    }

    .desc { margin: 0; color: var(--text-muted); font-size: 14px; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-weight: 500;}
    
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: auto; }
    .tag {
      padding: 4px 10px; border-radius: 6px;
      background: #f1f5f9;
      border: 1px solid rgba(15,23,42,0.05);
      font-size: 12px; color: var(--text-muted); font-weight: 600;
      transition: all 0.2s ease;
    }
    .card:hover .tag {
      background: rgba(14, 165, 233, 0.08);
      color: var(--tech-cyan);
      border-color: rgba(14, 165, 233, 0.15);
    }

    .actions {
      display: flex; justify-content: space-between; align-items: center; gap: 12px;
      padding: 16px 20px; border-top: 1px solid rgba(15,23,42,0.04);
      background: rgba(248, 250, 252, 0.5);
      position: relative; z-index: 2;
    }
    
    .small-note { font-size: 12px; color: #94a3b8; font-weight: 500; }
    
    .go {
      display: inline-flex; align-items: center; gap: 6px;
      color: #ffffff; font-weight: 700; font-size: 13px;
      padding: 6px 16px; border-radius: 999px;
      background: #0f172a;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 10px rgba(15,23,42,0.15);
    }
    .card:hover .go {
      background: var(--tech-cyan);
      box-shadow: 0 6px 15px rgba(14, 165, 233, 0.3);
    }
    .go span { transition: transform 0.2s ease; }
    .card:hover .go span { transform: translateX(3px) translateY(-3px); }

    .empty {
      margin-top: 32px; padding: 40px 20px; border-radius: var(--radius-md); 
      border: 2px dashed rgba(15,23,42,0.1);
      color: var(--text-muted); text-align: center; background: rgba(255,255,255,0.5);
      font-size: 15px; font-weight: 500;
      backdrop-filter: blur(10px);
    }

    /* 淡色系滾動條 */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>

  <div class="wrap">
    <header class="hero">
      <div class="hero-top">
        <div class="brand">
          <div class="logo" aria-hidden="true"></div>
          <div>
            <h1 class="title">Ai輔助互動頁面建置</h1>
            <p class="subtitle">Light Tech Edition</p>
          </div>
        </div>
        <div class="top-badge">2026 余老師資訊科技</div>
      </div>

      <div class="toolbar" role="search">
        <label class="search" aria-label="搜尋卡片">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">

      <div class="result-bar">顯示 <span id="resultCount">0</span> 個入口</div>

    </main>
  </div>

    /*
    ======================================================================
    三、卡片資料區 CARD_DATA
    ----------------------------------------------------------------------
    */
    const CARD_DATA = [
      {
        title: '羅馬旅遊地圖',
        href: 'demo/romo2.html',
        tag: 'person',
        badge: 'Java',
        description: '羅馬地圖',
        chips: ['旅遊', '羅馬'],
        keywords: ['地圖', 'map', '互動',  '視覺化'],
        thumbnail: 'map',
      },
      {
        title: '語音辨識',
        href: 'demo/language.html',
        tag: 'language',
        badge: '工具',
        description: '語音轉文字的小工具。',
        chips: ['Other', 'Doc'],
        keywords: ['markdown', 'doc', 'readme', '工具', '文件'],
        thumbnail: 'doc',
      },
    ];

    /*
    ======================================================================
    四、畫面渲染與篩選邏輯
    ----------------------------------------------------------------------
    */
    const cardGrid = document.getElementById('cardGrid');
    const chipBar = document.getElementById('chipBar');
    const searchInput = document.getElementById('searchInput');
    const resultCount = document.getElementById('resultCount');
    const emptyState = document.getElementById('emptyState');

    let activeTag = 'all';
    let keyword = '';

    function normalizeText(text) {
      return String(text || '').toLowerCase().trim();
    }

    function buildChips() {
      chipBar.innerHTML = TAG_DEFS.map(tag => `
        <button
          class="chip"
          type="button"
          data-tag="${tag.value}"
          aria-pressed="${tag.value === 'all' ? 'true' : 'false'}"
        >${tag.label}</button>
      `).join('');

      chipBar.addEventListener('click', (event) => {
        const btn = event.target.closest('.chip');
        if (!btn) return;
        activeTag = btn.dataset.tag;
        [...chipBar.querySelectorAll('.chip')].forEach(el => {
          el.setAttribute('aria-pressed', String(el === btn));
        });
        renderCards();
      });
    }

    function cardMatches(card) {
      const hitTag = activeTag === 'all' || card.tag === activeTag;
      const textBundle = [card.title, card.description, ...(card.chips || []), ...(card.keywords || [])]
        .join(' ')
        .toLowerCase();
      const hitKeyword = !keyword || textBundle.includes(keyword);
      return hitTag && hitKeyword;
    }

    function createCardHTML(card) {
      const thumb = THUMBNAILS[card.thumbnail] || THUMBNAILS.doc;
      const chips = (card.chips || []).map(text => `<span class="tag">${text}</span>`).join('');
      const tagLabel = TAG_DEFS.find(tag => tag.value === card.tag)?.label || card.tag;

      return `
        <a class="card" href="${card.href}" target="_blank" rel="noopener">
          <div class="thumb">
            <div class="thumb-badge">${card.badge || tagLabel}</div>
            ${thumb}
          </div>
          <div class="body">
            <div class="name-row">
              <h2 class="name">${card.title}</h2>
              <span class="pill">${tagLabel}</span>
            </div>
            <p class="desc">${card.description || ''}</p>
            <div class="tags">${chips}</div>
          </div>
          <div class="actions">
            <span class="small-note">點整張卡片即可前往</span>
            <span class="go"><span>前往 ↗</span></span>
          </div>
        </a>
      `;
    }

    function renderCards() {
      const visibleCards = CARD_DATA.filter(cardMatches);
      cardGrid.innerHTML = visibleCards.map(createCardHTML).join('');
      resultCount.textContent = visibleCards.length;
      emptyState.hidden = visibleCards.length !== 0;
    }

    searchInput.addEventListener('input', () => {
      keyword = normalizeText(searchInput.value);
      renderCards();
    });

    // 增加一個追蹤鼠標位置的特效來觸發卡片光暈
    document.addEventListener('mousemove', (e) => {
      const cards = document.querySelectorAll('.card');
      cards.forEach(card => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        card.style.setProperty('--mouse-x', `${x}px`);
      });
    });

    buildChips();
    renderCards();
  </script>
