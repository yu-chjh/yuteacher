<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LAB ENTRANCE｜低調光澤版</title>
  <meta name="description" content="卡片式入口頁範例：可搜尋、可依標籤篩選，方便修改縮圖、連結與新增標籤。" />
  <meta name="theme-color" content="#0b1020" />
  <style>
    :root{
      --bg:#03050c;
      --bg-2:#090d1a;
      --panel:#0c1220;
      --panel-2:#10182b;
      --glass:rgba(255,255,255,.045);
      --text:#f6f7fb;
      --muted:#a7b1c4;
      --line:rgba(255,255,255,.09);
      --line-strong:rgba(196,181,253,.26);
      --brand:#7dd3fc;
      --brand-2:#c4b5fd;
      --brand-3:#f8fafc;
      --chip:#131a2b;
      --chip-on:#213352;
      --chip-on-text:#ffffff;
      --shadow:0 22px 70px rgba(0,0,0,.52);
      --shadow-soft:0 10px 28px rgba(0,0,0,.28);
      --radius:18px;
      --radius-lg:24px;
      --max:1240px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      color:var(--text);
      font:16px/1.6 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans TC",Arial,sans-serif;
      background:
        radial-gradient(900px 420px at 12% -4%, rgba(196,181,253,.14), transparent 62%),
        radial-gradient(980px 460px at 88% -8%, rgba(125,211,252,.12), transparent 64%),
        radial-gradient(700px 400px at 50% 120%, rgba(59,130,246,.08), transparent 68%),
        linear-gradient(180deg, #070b14 0%, #03050c 46%, #02030a 100%);
      position:relative;
      overflow-x:hidden;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(115deg, transparent 15%, rgba(255,255,255,.028) 28%, transparent 38%),
        radial-gradient(1200px 120px at 50% 0%, rgba(255,255,255,.04), transparent 80%);
      mix-blend-mode:screen;
      opacity:.9;
    }
    a{color:inherit;text-decoration:none}
    .wrap{max-width:var(--max);margin:0 auto;padding:24px 18px 48px}

    .hero{
      display:grid;
      gap:18px;
      padding:24px;
      border-radius:28px;
      border:1px solid rgba(255,255,255,.08);
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.025)),
        linear-gradient(135deg, rgba(196,181,253,.06), transparent 40%, rgba(125,211,252,.04) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.09),
        inset 0 -1px 0 rgba(255,255,255,.03),
        var(--shadow);
      backdrop-filter:blur(12px) saturate(110%);
      position:relative;
      overflow:hidden;
    }
    .hero::before{
      content:"";
      position:absolute;
      inset:-1px;
      border-radius:inherit;
      pointer-events:none;
      background:
        linear-gradient(120deg, rgba(255,255,255,.12), transparent 22%, transparent 74%, rgba(125,211,252,.07)),
        radial-gradient(380px 120px at 16% 0%, rgba(255,255,255,.10), transparent 70%);
      mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      padding:1px;
      -webkit-mask-composite:xor;
              mask-composite:exclude;
      opacity:.7;
    }
    .hero-top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap}
    .brand{display:flex;gap:14px;align-items:flex-start}
    .logo{
      width:48px;height:48px;display:grid;place-items:center;flex:none;
      border-radius:16px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.82), rgba(255,255,255,.22) 18%, rgba(196,181,253,.42) 52%, rgba(125,211,252,.35) 100%);
      color:#0b1120;
      font-weight:900;
      letter-spacing:.08em;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.62),
        0 14px 28px rgba(0,0,0,.34),
        0 0 28px rgba(196,181,253,.12);
      position:relative;
      overflow:hidden;
    }
    .logo::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,.55), transparent 38%);
      pointer-events:none;
    }
    .title{margin:0;font-size:clamp(28px,5vw,46px);line-height:1.05;letter-spacing:.04em}
    .subtitle{margin:8px 0 0;color:var(--muted);font-size:14px}
    .top-badge{
      padding:8px 12px;border-radius:999px;border:1px solid rgba(196,181,253,.22);
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      color:#ece9ff;font-size:12px;letter-spacing:.18em;text-transform:uppercase;
      white-space:nowrap;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08), var(--shadow-soft);
    }

    .toolbar{display:grid;gap:12px}
    @media (min-width:920px){
      .toolbar{grid-template-columns:minmax(0,1.4fr) minmax(0,1fr);align-items:center}
    }
    .search{
      display:flex;align-items:center;gap:12px;padding:12px 16px;
      border-radius:999px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.02)),
        rgba(8,12,22,.86);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        inset 0 -1px 0 rgba(255,255,255,.03),
        var(--shadow-soft);
    }
    .search svg{color:#cbd5e1;opacity:.82}
    .search input{
      width:100%;border:0;outline:0;background:transparent;color:var(--text);font-size:16px;
    }
    .search input::placeholder{color:#94a3b8}
    .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-start}
    .chip{
      appearance:none;
      border:1px solid rgba(255,255,255,.08);
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02)),
        var(--chip);
      color:#dbeafe;
      padding:8px 12px;border-radius:999px;cursor:pointer;font-size:14px;transition:.15s ease;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
    }
    .chip:hover{transform:translateY(-1px);border-color:rgba(196,181,253,.22)}
    .chip[aria-pressed="true"]{
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03)),
        linear-gradient(135deg, rgba(196,181,253,.30), rgba(125,211,252,.18)),
        var(--chip-on);
      color:var(--chip-on-text);
      border-color:rgba(255,255,255,.06);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.16),
        0 8px 24px rgba(0,0,0,.26);
    }

    .result-bar{margin:12px 2px 0;color:var(--muted);font-size:13px}

    .grid{
      display:grid;grid-template-columns:repeat(1,minmax(0,1fr));gap:18px;margin-top:24px;
    }
    @media (min-width:680px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media (min-width:1040px){.grid{grid-template-columns:repeat(3,minmax(0,1fr))}}

    .card{
      display:grid;grid-template-rows:auto 1fr auto;
      min-height:320px;border-radius:22px;overflow:hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.015)),
        linear-gradient(180deg,var(--panel),var(--panel-2));
      border:1px solid rgba(255,255,255,.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        inset 0 -1px 0 rgba(255,255,255,.02),
        var(--shadow);
      transition:transform .15s ease,border-color .15s ease, box-shadow .15s ease, background .15s ease;
      position:relative;
    }
    .card::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:linear-gradient(135deg, rgba(255,255,255,.10), transparent 18%, transparent 72%, rgba(125,211,252,.05));
      opacity:.58;
    }
    .card:hover{
      transform:translateY(-4px);
      border-color:rgba(196,181,253,.22);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.11),
        0 30px 72px rgba(0,0,0,.58),
        0 0 0 1px rgba(255,255,255,.02);
      background:
        linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.018)),
        linear-gradient(180deg, #0d1424, #121c31);
    }
    .thumb{
      aspect-ratio:16/9;position:relative;display:grid;place-items:center;
      background:
        radial-gradient(160px 70px at 20% 0%, rgba(255,255,255,.10), transparent 75%),
        linear-gradient(135deg, rgba(125,211,252,.11), rgba(196,181,253,.08)),
        linear-gradient(180deg, rgba(4,7,14,.92), rgba(9,14,26,.98));
      border-bottom:1px solid rgba(255,255,255,.07);
      padding:18px;
    }
    .thumb::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:linear-gradient(135deg, rgba(255,255,255,.15), transparent 28%);
      opacity:.7;
    }
    .thumb svg{
      width:100%;height:100%;max-width:300px;max-height:160px;color:#ffffff;
      filter:drop-shadow(0 10px 18px rgba(0,0,0,.42));
    }
    .thumb-badge{
      position:absolute;left:12px;top:12px;padding:6px 10px;border-radius:999px;font-size:12px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02)),
        rgba(3,7,18,.52);
      border:1px solid rgba(255,255,255,.10);color:#ffffff;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.07);
    }
    .body{padding:16px;display:grid;gap:8px;align-content:start}
    .name-row{display:flex;gap:12px;align-items:flex-start;justify-content:space-between}
    .name{font-size:28px;font-weight:800;line-height:1.15;letter-spacing:-.02em;margin:0}
    .pill{
      padding:4px 10px;border-radius:999px;border:1px solid rgba(196,181,253,.22);
      font-size:12px;color:#eef2ff;white-space:nowrap;
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
    }
    .desc{margin:0;color:var(--muted);font-size:14px}
    .tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
    .tag{
      padding:4px 8px;border-radius:999px;
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
      border:1px solid rgba(255,255,255,.07);
      font-size:12px;color:#dbeafe;
    }
    .actions{
      display:flex;justify-content:space-between;align-items:center;gap:12px;
      padding:14px 16px;border-top:1px solid rgba(255,255,255,.07);
      background:linear-gradient(180deg, rgba(255,255,255,.012), rgba(255,255,255,.02));
    }
    .hint{font-size:12px;color:var(--muted)}
    .go{
      display:inline-flex;align-items:center;gap:8px;
      color:#f8fafc;font-weight:700;font-size:14px;
      padding:8px 12px;border-radius:999px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.02)),
        linear-gradient(135deg, rgba(196,181,253,.16), rgba(125,211,252,.10));
      border:1px solid rgba(255,255,255,.08);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
    }
    .go span{color:#7dd3fc}

    .empty{
      margin-top:18px;padding:18px;border-radius:18px;border:1px dashed rgba(255,255,255,.14);
      color:var(--muted);text-align:center;background:rgba(255,255,255,.02)
    }

    .helper{
      margin-top:26px;padding:20px;border-radius:24px;border:1px solid rgba(255,255,255,.08);
      background:
        linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.015)),
        linear-gradient(180deg, rgba(11,16,30,.9), rgba(9,13,24,.96));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.07),
        var(--shadow-soft);
    }
    .helper h2{margin:0 0 10px;font-size:18px}
    .helper p,.helper li{color:var(--muted);font-size:14px}
    .helper code{
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);padding:1px 6px;border-radius:8px;color:#ffffff
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <div class="hero-top">
        <div class="brand">
          <div class="logo" aria-hidden="true">L</div>
          <div>
            <h1 class="title">Ai輔助互動頁面建置</h1>
            <p class="subtitle">低調暗色主題</p>
          </div>
        </div>
        <div class="top-badge">2026達觀科技中心</div>
      </div>

      <div class="toolbar" role="search">
        <label class="search" aria-label="搜尋卡片">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"></circle>
            <path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
          </svg>
          <input id="searchInput" type="search" placeholder="輸入關鍵字搜尋標題、說明或標籤…" autocomplete="off" />
        </label>
        <div class="chips" id="chipBar" aria-label="分類標籤"></div>
      </div>

      <div class="result-bar">顯示 <span id="resultCount">0</span> 個入口</div>
    </header>

    <main>
      <section id="cardGrid" class="grid" aria-live="polite"></section>
      <div id="emptyState" class="empty" hidden>找不到符合條件的頁面，請調整搜尋字或篩選標籤。</div>
    </main>
  </div>

  <script>
    /*
    ======================================================================
    一、標籤設定區 TAG_DEFS
    ----------------------------------------------------------------------
    用途：控制頁面右上角會出現哪些篩選按鈕。

    修改方式：
    1. label = 按鈕顯示文字
    2. value = 內部識別值，請保持簡短且唯一
    3. 如果新增新標籤，記得同步把對應卡片的 tag 改成同樣 value
    ======================================================================
    */
    const TAG_DEFS = [
      { label: '全部', value: 'all' },
      { label: 'Java', value: 'java' },
      { label: 'CSS', value: 'css' },
      { label: 'JS', value: 'js' },
      { label: '工具', value: 'tool' },
      { label: '繪圖', value: 'draw' },
      { label: '其他', value: 'other' },
    ];

    /*
    ======================================================================
    二、縮圖設定區 THUMBNAILS
    ----------------------------------------------------------------------
    用途：集中管理每種縮圖 SVG。

    修改方式：
    1. 左邊 key 是縮圖代號，右邊是 SVG 字串
    2. 卡片資料裡只要寫 thumbnail: 'dashboard' 這種代號即可
    3. 之後要換圖時，只需要改這裡，不用去找每一張卡片的 HTML
    ======================================================================
    */
    const THUMBNAILS = {
      map:`<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <g id="art" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><circle cx="29.45012855529785" cy="22.037975311279297" r="10.656079598330276" fill="none" stroke="currentColor" transform="matrix(1 0 0 1 0.971954 0.583171)"></circle><path fill="none" stroke="currentColor" d="M 25.08 23.20 L 25.17 22.91 L 25.56 21.94 L 25.66 21.65 L 26.05 20.97 L 26.44 20.68 L 26.73 20.48 L 27.12 20.48 L 27.21 20.48 L 27.31 20.48 L 27.41 20.48 L 27.51 20.48 L 27.60 20.58 L 27.70 20.87 L 27.80 21.26 L 27.90 21.75 L 27.90 22.14 L 27.90 22.52 L 27.99 22.82 L 27.99 23.11 L 28.09 23.50 L 28.09 23.59 L 28.09 23.79 L 28.09 23.88"></path><path fill="none" stroke="currentColor" d="M 30.52 23.59 L 30.52 23.50 L 30.62 23.30 L 30.91 22.91 L 31.20 22.33 L 31.49 22.14 L 31.69 21.84 L 31.78 21.65 L 32.07 21.36 L 32.17 21.16 L 32.37 20.97 L 32.46 20.68 L 32.56 20.58 L 32.56 20.39 L 32.66 20.39 L 32.75 20.39 L 32.85 20.39 L 33.05 20.39 L 33.24 20.39 L 33.34 20.39 L 33.44 20.39 L 33.53 20.39 L 33.63 20.48 L 33.82 20.58 L 33.92 20.68 L 34.21 20.87 L 34.31 21.07 L 34.41 21.26 L 34.80 21.45 L 34.99 21.65 L 35.09 21.84 L 35.18 22.04 L 35.28 22.14 L 35.38 22.23 L 35.38 22.33 L 35.48 22.43 L 35.48 22.52 L 35.48 22.62 L 35.48 22.72 L 35.48 22.82 L 35.57 22.91"></path><path fill="none" stroke="currentColor" d="M 29.84 27.38 L 29.74 27.58 L 29.74 28.16 L 29.64 29.13 L 29.64 29.81 L 30.23 32.44 L 31.01 34.19 L 31.59 35.06 L 32.27 36.03 L 32.95 37.20 L 33.53 38.37 L 33.73 39.14 L 33.92 40.99 L 33.92 42.16 L 33.63 43.71 L 33.44 44.78 L 33.24 46.14 L 33.05 47.21 L 32.85 47.79 L 32.75 48.09 L 32.66 48.28 L 32.37 48.77 L 32.27 49.16 L 32.07 49.54 L 31.98 49.84 L 31.78 49.93 L 31.69 49.93 L 31.59 49.93 L 31.49 49.93 L 31.49 49.84 L 31.49 49.64"></path></g>
</svg>`,
      blocks: `
        <svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg" fill="none">
          <rect x="14" y="16" width="70" height="34" rx="8" fill="currentColor" opacity=".85"/>
          <rect x="96" y="16" width="70" height="34" rx="8" fill="currentColor" opacity=".18"/>
          <rect x="14" y="60" width="70" height="34" rx="8" fill="currentColor" opacity=".18"/>
          <rect x="96" y="60" width="70" height="34" rx="8" fill="currentColor" opacity=".18"/>
          <circle cx="49" cy="33" r="4" fill="#0f172a"/>
          <circle cx="131" cy="33" r="4" fill="#dbeafe"/>
          <path d="M49 39v28M131 39v28" stroke="currentColor" opacity=".4" stroke-dasharray="4 4"/>
        </svg>
      `,
      orbit: `
        <svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg" fill="none">
          <circle cx="100" cy="60" r="28" fill="currentColor" opacity=".75"/>
          <path d="M40 62c0-20 28-36 60-36s60 16 60 36-28 36-60 36-60-16-60-36Z" stroke="currentColor"/>
          <circle cx="44" cy="60" r="5" fill="#dbeafe"/>
          <circle cx="144" cy="78" r="6" fill="#bfdbfe"/>
          <circle cx="150" cy="38" r="4" fill="#fde68a"/>
        </svg>
      `,
      gauge: `
        <svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg" fill="none">
          <path d="M42 78a58 58 0 0 1 116 0" stroke="currentColor" stroke-width="12" opacity=".2"/>
          <path d="M42 78a58 58 0 0 1 82-48" stroke="currentColor" stroke-width="12" opacity=".85"/>
          <circle cx="100" cy="78" r="6" fill="#dbeafe"/>
          <path d="M100 78l40-40" stroke="#dbeafe" stroke-width="4" stroke-linecap="round"/>
          <circle cx="60" cy="88" r="3" fill="#dbeafe" opacity=".5"/>
          <circle cx="80" cy="94" r="3" fill="#dbeafe" opacity=".5"/>
          <circle cx="120" cy="94" r="3" fill="#dbeafe" opacity=".5"/>
          <circle cx="140" cy="88" r="3" fill="#dbeafe" opacity=".5"/>
        </svg>
      `,
      doc: `
        <svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg" fill="none">
          <rect x="54" y="18" width="92" height="84" rx="10" stroke="currentColor" stroke-width="2"/>
          <rect x="64" y="30" width="68" height="14" rx="5" fill="currentColor" opacity=".18"/>
          <rect x="64" y="52" width="42" height="10" rx="5" fill="currentColor" opacity=".18"/>
          <rect x="64" y="70" width="58" height="10" rx="5" fill="currentColor" opacity=".18"/>
          <path d="M116 64l10 10 18-22" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      `,
      bottles: `
        <svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg" fill="none">
          <path d="M40 90h120" stroke="currentColor" stroke-width="6" opacity=".18" stroke-linecap="round"/>
          <rect x="56" y="42" width="24" height="38" rx="5" stroke="currentColor" stroke-width="3"/>
          <rect x="90" y="28" width="28" height="52" rx="6" stroke="currentColor" stroke-width="3"/>
          <rect x="132" y="36" width="22" height="44" rx="5" stroke="currentColor" stroke-width="3"/>
          <rect x="60" y="50" width="16" height="22" rx="4" fill="currentColor" opacity=".65"/>
          <rect x="96" y="38" width="16" height="30" rx="4" fill="currentColor" opacity=".85"/>
          <rect x="136" y="48" width="14" height="18" rx="4" fill="currentColor" opacity=".35"/>
        </svg>
      `,
    };

    /*
    ======================================================================
    三、卡片資料區 CARD_DATA
    ----------------------------------------------------------------------
    用途：這是你最常改的地方。

    每張卡片欄位說明：
    - title       ：卡片標題
    - href        ：要連出去的頁面路徑
    - tag         ：主要分類，必須對應 TAG_DEFS.value
    - badge       ：縮圖左上角小標籤，可自由填
    - description ：卡片說明
    - chips       ：卡片底部的小標籤，可填多個
    - keywords    ：搜尋用關鍵字，建議把別名也放進來
    - thumbnail   ：對應 THUMBNAILS 的代號

    新增卡片方式：
    1. 複製下面任一物件
    2. 改 title / href / tag / description / thumbnail
    3. 若 tag 是新類別，記得去 TAG_DEFS 新增按鈕
    ======================================================================
    */
    const CARD_DATA = [
            {
        title: '羅馬旅遊地圖',
        href: 'demo/romo2.html',
        tag: 'java',
        badge: 'Java',

    /*
    ======================================================================
    四、以下是畫面渲染與篩選邏輯
    ----------------------------------------------------------------------
    通常不用改。
    如果你只是新增卡片 / 新增標籤 / 換縮圖，到上面三區修改即可。
    ======================================================================
    */
    const cardGrid = document.getElementById('cardGrid');
    const chipBar = document.getElementById('chipBar');
    const searchInput = document.getElementById('searchInput');
    const resultCount = document.getElementById('resultCount');
    const emptyState = document.getElementById('emptyState');

    let activeTag = 'all';
    let keyword = '';

    function normalizeText(text) {
      return String(text || '').toLowerCase().trim();
    }

    function buildChips() {
      chipBar.innerHTML = TAG_DEFS.map(tag => `
        <button
          class="chip"
          type="button"
          data-tag="${tag.value}"
          aria-pressed="${tag.value === 'all' ? 'true' : 'false'}"
        >${tag.label}</button>
      `).join('');

      chipBar.addEventListener('click', (event) => {
        const btn = event.target.closest('.chip');
        if (!btn) return;
        activeTag = btn.dataset.tag;
        [...chipBar.querySelectorAll('.chip')].forEach(el => {
          el.setAttribute('aria-pressed', String(el === btn));
        });
        renderCards();
      });
    }

    function cardMatches(card) {
      const hitTag = activeTag === 'all' || card.tag === activeTag;
      const textBundle = [card.title, card.description, ...(card.chips || []), ...(card.keywords || [])]
        .join(' ')
        .toLowerCase();
      const hitKeyword = !keyword || textBundle.includes(keyword);
      return hitTag && hitKeyword;
    }

    function createCardHTML(card) {
      const thumb = THUMBNAILS[card.thumbnail] || THUMBNAILS.doc;
      const chips = (card.chips || []).map(text => `<span class="tag">${text}</span>`).join('');
      const tagLabel = TAG_DEFS.find(tag => tag.value === card.tag)?.label || card.tag;

      return `
        <a class="card" href="${card.href}" target="_blank" rel="noopener">
          <div class="thumb">
            <div class="thumb-badge">${card.badge || tagLabel}</div>
            ${thumb}
          </div>
          <div class="body">
            <div class="name-row">
              <h2 class="name">${card.title}</h2>
              <span class="pill">${tagLabel}</span>
            </div>
            <p class="desc">${card.description || ''}</p>
            <div class="tags">${chips}</div>
          </div>
          <div class="actions">
            <span class="small-note">點整張卡片即可前往</span>
            <span class="go">前往 ↗</span>
          </div>
        </a>
      `;
    }

    function renderCards() {
      const visibleCards = CARD_DATA.filter(cardMatches);
      cardGrid.innerHTML = visibleCards.map(createCardHTML).join('');
      resultCount.textContent = visibleCards.length;
      emptyState.hidden = visibleCards.length !== 0;
    }

    searchInput.addEventListener('input', () => {
      keyword = normalizeText(searchInput.value);
      renderCards();
    });

    buildChips();
    renderCards();
  </script>
