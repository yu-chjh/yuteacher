<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 確保手機平板上的顯示比例正確，並停用雙指縮放整個網頁，將縮放功能保留給地圖 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>羅馬徒步導覽地圖 v0.1</title>
    
    <!-- 引入 Leaflet CSS (地圖核心樣式) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <style>
        /* 讓地圖填滿整個螢幕 */
        body {
            padding: 0;
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        html, body, #map {
            height: 100%;
            width: 100vw;
        }
        
        /* 定位按鈕樣式 */
        .gps-btn {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 1000;
            background: white;
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
            cursor: pointer;
            font-weight: bold;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
            user-select: none;
            transition: background 0.2s;
        }
        .gps-btn:hover {
            background: #f0f0f0;
        }
        .gps-btn:active {
            background: #e0e0e0;
        }
    </style>
</head>
<body>

    <!-- 地圖容器 -->
    <div id="map"></div>

    <!-- GPS 定位按鈕 -->
    <div class="gps-btn" id="locateBtn" onclick="locateUser()">
        <span style="font-size: 1.2em;">📍</span> 定位我的位置
    </div>

    <!-- 引入 Leaflet JS (地圖核心邏輯) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        // 1. 初始化地圖，設定中心點為羅馬，預設縮放層級為 15
        // Leaflet 預設已經開啟電腦滑鼠滾輪縮放/拖曳，以及手機雙指縮放/拖曳功能
        var map = L.map('map', {
            zoomControl: true,
            tap: true
        }).setView([41.8950, 12.4810], 15);

        // 2. 加入 OpenStreetMap 圖層 (支援瀏覽器自動快取供離線使用)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. 定義重要景點座標與資訊
        var landmarks = [
            { id: 1, name: "羅馬競技場 (Colosseum)", lat: 41.8902, lng: 12.4922, desc: "羅馬帝國最具代表性的羅馬競技場。" },
            { id: 2, name: "古羅馬廣場 (Roman Forum)", lat: 41.8925, lng: 12.4853, desc: "古羅馬時代的城市中心。" },
            { id: 3, name: "萬神殿 (Pantheon)", lat: 41.8986, lng: 12.4769, desc: "保存最完整的古羅馬建築之一。" },
            { id: 4, name: "納沃納廣場 (Piazza Navona)", lat: 41.8992, lng: 12.4731, desc: "充滿巴洛克藝術氣息的美麗廣場。" },
            { id: 5, name: "特雷維噴泉 (Trevi Fountain)", lat: 41.9009, lng: 12.4833, desc: "著名的許願池，別忘了背對噴泉拋枚硬幣！" }
        ];

        // 建立路線座標陣列 (依序串連景點)
        var routeCoordinates = [];

        // 4. 將景點標記加到地圖上
        landmarks.forEach(function(lm) {
            // 加入標記
            var marker = L.marker([lm.lat, lm.lng]).addTo(map);
            
            // 設定點擊彈出視窗
            var popupContent = `
                <div style="text-align:center;">
                    <h3 style="margin: 0 0 5px 0; color: #d32f2f;">${lm.name}</h3>
                    <p style="margin: 0; font-size: 14px;">${lm.desc}</p>
                </div>
            `;
            marker.bindPopup(popupContent);
            
            // 收集路線座標
            routeCoordinates.push([lm.lat, lm.lng]);
        });

        // 5. 繪製步行規劃路線 (使用預先繪製的折線，確保離線狀態下依然可見)
        var walkRoute = L.polyline(routeCoordinates, {
            color: '#2196F3', // 路線顏色 (藍色)
            weight: 5,        // 路線粗細
            opacity: 0.8,     // 透明度
            dashArray: '10, 10', // 虛線樣式，表示步行
            lineJoin: 'round'
        }).addTo(map);

        // 自動調整地圖視野以包含整條路線
        map.fitBounds(walkRoute.getBounds(), { padding: [30, 30] });

        // 6. GPS 讀取與定位功能
        var userMarker = null;
        var userCircle = null;

        function locateUser() {
            // 請求 GPS 定位
            map.locate({setView: true, maxZoom: 16, enableHighAccuracy: true});
            document.getElementById('locateBtn').innerHTML = "⏳ 定位中...";
        }

        // 當成功獲取位置時
        map.on('locationfound', function(e) {
            document.getElementById('locateBtn').innerHTML = "📍 定位我的位置";
            var radius = e.accuracy / 2;

            // 如果已經有標記，先移除
            if (userMarker) map.removeLayer(userMarker);
            if (userCircle) map.removeLayer(userCircle);

            // 加入使用者位置標記與誤差範圍圓圈
            userMarker = L.marker(e.latlng).addTo(map).bindPopup("您目前的位置").openPopup();
            userCircle = L.circle(e.latlng, radius, {
                color: '#4CAF50',
                fillColor: '#4CAF50',
                fillOpacity: 0.2
            }).addTo(map);
        });

        // 當無法獲取位置時
        map.on('locationerror', function(e) {
            document.getElementById('locateBtn').innerHTML = "📍 定位我的位置";
            // 使用客製化訊息方塊代替 alert (更友善的 UI 體驗)
            showCustomMessage("無法讀取 GPS 資訊。請確認您已開啟設備的定位功能，並允許瀏覽器存取位置。");
        });

        // 客製化訊息提示功能 (避免使用傳統 alert 影響體驗)
        function showCustomMessage(msg) {
            var msgDiv = document.createElement('div');
            msgDiv.style.cssText = "position:fixed; top:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:white; padding:15px 20px; border-radius:5px; z-index:2000; font-family:sans-serif; text-align:center; max-width:80%;";
            msgDiv.innerText = msg;
            document.body.appendChild(msgDiv);
            
            // 3秒後自動消失
            setTimeout(function() {
                msgDiv.remove();
            }, 3000);
        }
    </script>
</body>
</html>
